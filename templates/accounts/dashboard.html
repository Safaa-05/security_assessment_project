{% extends 'base.html' %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body">

            <h2>Welcome, {{ request.user.username }}!</h2>

            <p>You have successfully logged in.</p>

            <a href="{% url 'logout' %}" class="btn btn-danger">
                Logout

        </div>

    </div>

</div>

{% endblock %}
