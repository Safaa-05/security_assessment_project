{% extends "base.html" %}

{% block title %}Contact Us{% endblock %}

{% block content %}

<div class="container mt-5">

    <h2 class="mb-4">Contact Us</h2>

    <!-- Success Message -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="alert"
                        aria-label="Close">
                </button>
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Name</label>
            <input
                type="text"
                class="form-control"
                name="name"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input
                type="email"
                class="form-control"
                name="email"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Subject</label>
            <input
                type="text"
                class="form-control"
                name="subject"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Message</label>
            <textarea
                class="form-control"
                rows="5"
                name="message"
                required></textarea>
        </div>

        <button type="submit" class="btn btn-primary">
            Send Message
        </button>

    </form>

</div>

{% endblock %}
